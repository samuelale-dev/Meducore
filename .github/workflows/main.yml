name: Fix API lib
on: workflow_dispatch
jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Fix imports to use _lib
        run: |
          find educore/client/api -name "*.ts" ! -path "*/_lib/*" -exec sed -i "s|from '../lib/|from '../_lib/|g" {} \;
          find educore/client/api -name "*.ts" ! -path "*/_lib/*" -exec sed -i "s|from '../../lib/|from '../../_lib/|g" {} \;
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add .
          git commit -m "Fix imports to use _lib"
          git push
