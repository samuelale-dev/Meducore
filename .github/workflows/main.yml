name: Fix lib folder
on: workflow_dispatch
jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Fix _lib imports
        run: |
          find educore/client/api -name "*.ts" -exec sed -i 's|from '\''../_lib/|from '\''../lib/|g' {} \;
          find educore/client/api -name "*.ts" -exec sed -i 's|from '\''../../_lib/|from '\''../../lib/|g' {} \;
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add .
          git commit -m "Fix _lib imports to lib"
          git push
