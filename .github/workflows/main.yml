name: Fix API lib
on: workflow_dispatch
jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Show current structure
        run: |
          echo "=== api folder ==="
          find educore/client/api -type f | sort
      - name: Create _lib as copy of lib
        run: |
          cp -r educore/client/api/lib educore/client/api/_lib
          echo "=== after copy ==="
          find educore/client/api -type f | sort
      - name: Commit
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add .
          git commit -m "Add _lib folder alongside lib"
          git push
          
